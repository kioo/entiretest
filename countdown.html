<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 0.5em;
        }
        .countdown {
            display: flex;
            gap: 1.5rem;
        }
        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }
        .number {
            font-size: 3.5rem;
            font-weight: 700;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }
        .label {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .input-section {
            margin-top: 3rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        input {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            outline: none;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            background: #00d9ff;
            color: #1a1a2e;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }
        .target-date {
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>倒计时</h1>

    <div class="countdown">
        <div class="time-unit">
            <span class="number" id="days">00</span>
            <span class="label">天</span>
        </div>
        <div class="time-unit">
            <span class="number" id="hours">00</span>
            <span class="label">时</span>
        </div>
        <div class="time-unit">
            <span class="number" id="minutes">00</span>
            <span class="label">分</span>
        </div>
        <div class="time-unit">
            <span class="number" id="seconds">00</span>
            <span class="label">秒</span>
        </div>
    </div>

    <div class="input-section">
        <input type="datetime-local" id="datetimeInput">
        <button onclick="startCountdown()">开始倒计时</button>
    </div>

    <div class="target-date" id="targetDisplay"></div>

    <script>
        let targetTime = null;
        let countdownInterval = null;

        function updateCountdown() {
            if (!targetTime) return;

            const now = new Date().getTime();
            const distance = targetTime - now;

            if (distance <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                clearInterval(countdownInterval);
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        function startCountdown() {
            const input = document.getElementById('datetimeInput').value;
            if (!input) {
                alert('请选择目标时间');
                return;
            }

            targetTime = new Date(input).getTime();

            document.getElementById('targetDisplay').textContent = '目标时间: ' + input.replace('T', ' ');

            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }
    </script>
</body>
</html>
